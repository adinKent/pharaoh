[tool.ruff]
target-version = "py311"
line-length = 88
extend-exclude = [
    ".aws-sam",
    "buck-out",
    "_build",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.ruff.lint]
# 啟動基本檢查 (E, W, F) 以及自動排序 Import (I)
select = ["E", "W", "F", "I"]

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 150
known_first_party = ["src"]